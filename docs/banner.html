<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ALYAC MARKET Banner</title>

    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }

      .banner {
        width: 1400px;
        height: 420px;
        background: linear-gradient(135deg, #f7fff8, #eefaf1);
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        border: 1px solid #e4efe8;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.1);
      }

      .circle1 {
        width: 220px;
        height: 220px;
        left: 60px;
        top: 180px;
      }

      .circle2 {
        width: 160px;
        height: 160px;
        right: 120px;
        top: 70px;
      }

      .square {
        position: absolute;
        width: 90px;
        height: 90px;
        border-radius: 20px;
        background: rgba(34, 197, 94, 0.15);
      }

      .square1 {
        left: 90px;
        top: 70px;
      }

      .square2 {
        right: 80px;
        bottom: 60px;
      }

      .content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .title-wrapper {
        display: flex;
        align-items: center;
        gap: 22px;
      }

      .title {
        font-size: 80px;
        font-weight: 800;
        color: #22c55e;
        margin: 0;
        line-height: 1;
      }

      /* 더 자연스러운 캡슐 아이콘 */
      .pill {
        width: 52px;
        height: 88px;
        border: 3px solid #5d9c5d;
        border-radius: 999px;
        background: linear-gradient(to bottom, #4ade80 0%, #4ade80 50%, #ffffff 50%, #ffffff 100%);
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
      }

      /* 가운데 구분선 */
      .pill::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: calc(50% - 1.5px);
        height: 3px;
        background: #5d9c5d;
      }

      .subtitle {
        margin-top: 16px;
        font-size: 32px;
        font-weight: 600;
        color: #64748b;
      }

      .line {
        width: 400px;
        height: 4px;
        margin: 20px 0;
        background: linear-gradient(90deg, transparent, #a7f3d0, transparent);
      }

      .badge {
        padding: 12px 26px;
        background: #22c55e;
        color: white;
        border-radius: 999px;
        font-size: 22px;
        font-weight: 700;
      }
    </style>
  </head>

  <body>
    <div class="banner">
      <div class="circle circle1"></div>
      <div class="circle circle2"></div>

      <div class="square square1"></div>
      <div class="square square2"></div>

      <div class="content">
        <div class="title-wrapper">
          <div class="pill"></div>
          <h1 class="title">ALYAC MARKET</h1>
          <div class="pill"></div>
        </div>

        <div class="subtitle">알약 마켓 서비스</div>

        <div class="line"></div>

        <div class="badge">TEAM 막내온탑</div>
      </div>
    </div>
  </body>
</html>
